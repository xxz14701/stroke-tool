<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>筆畫教學工具（穩定版）</title>

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<!-- 🔥 改用 unpkg，版本鎖定在有 bundle.js 的最後一版 -->
<script src="https://unpkg.com/ag-psd@14.3.13/dist/bundle.js"></script>

<style>
body { font-family:"Microsoft JhengHei"; background:#f5f7fb; text-align:center; }
.panel { background:white; padding:12px; border-radius:12px; display:inline-block; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-top:10px; }
button { margin:5px; padding:8px 12px; border:none; border-radius:8px; background:#4CAF50; color:white; cursor:pointer; }
canvas { border:1px solid #ccc; border-radius:10px; margin-top:10px; }
#writerArea { display:flex; justify-content:center; gap:10px; margin-top:10px; }
#status { font-size:13px; margin-top:6px; }
</style>
</head>

<body>

<h2>✍️ 中文筆畫教學工具（最終穩定）</h2>

<div class="panel">
  <input id="textInput" value="春天">
  <button onclick="generate()">產生</button>
  <button onclick="playAnimation()">筆順</button>
  <button onclick="downloadPNG()">PNG</button>
  <button onclick="downloadPSD()">PSD</button>
</div>

<div id="status"></div>
<div id="writerArea"></div>
<canvas id="c" width="500" height="320"></canvas>

<script>
const canvas = new fabric.Canvas('c');
let writers = [];

window.addEventListener('load', () => {
  const status = document.getElementById('status');
  // 官方全域名稱：agPsd（全小寫）
  if (window.agPsd && window.agPsd.writePsd) {
    status.textContent = '✅ ag-psd 載入成功';
    status.style.color = 'green';
  } else {
    status.textContent = '❌ ag-psd 載入失敗，請檢查網路';
    status.style.color = 'red';
    console.warn('所有全域變數:', Object.keys(window).filter(k => k.toLowerCase().includes('psd')));
  }
});

async function generate(){
  canvas.clear();
  writerArea.innerHTML = "";
  writers = [];
  const text = textInput.value;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const div = document.createElement("div");
    div.id = "w" + i;
    div.style.width = "100px";
    div.style.height = "100px";
    writerArea.appendChild(div);

    const writer = HanziWriter.create(div.id, char, {width:100, height:100});
    writers.push(writer);

    const data = await HanziWriter.loadCharacterData(char);
    data.strokes.forEach((stroke, index) => {
      const path = new fabric.Path(stroke, {
        fill: randomColor(),
        left: 80 * i + 50,
        top: 100,
        scaleX: 0.4,
        scaleY: 0.4
      });
      path.char = char;
      path.strokeIndex = index;
      canvas.add(path);
    });
  }
}

function playAnimation(){
  writers.forEach(w => w.animateCharacter());
}

function downloadPNG(){
  const url = canvas.toDataURL({format:'png', multiplier:2});
  const a = document.createElement("a");
  a.href = url;
  a.download = "作品.png";
  a.click();
}

function downloadPSD(){
  if(!window.agPsd || !window.agPsd.writePsd){
    alert("ag-psd 未載入，請重新整理頁面");
    return;
  }

  const { writePsd } = window.agPsd;
  const width = canvas.width;
  const height = canvas.height;

  const charGroups = {};
  canvas.getObjects().forEach(obj => {
    if(!charGroups[obj.char]) charGroups[obj.char] = [];
    charGroups[obj.char].push(obj);
  });

  if(Object.keys(charGroups).length === 0){
    alert("請先按「產生」再下載 PSD");
    return;
  }

  const children = Object.keys(charGroups).map(char => ({
    name: char,
    children: charGroups[char].map((obj, i) => {
      const temp = document.createElement('canvas');
      temp.width = width;
      temp.height = height;
      obj.render(temp.getContext('2d'));
      return { name: char + "_筆_" + (i + 1), canvas: temp };
    })
  }));

  try {
    const buffer = writePsd({ width, height, children });
    const blob = new Blob([buffer], { type: 'application/octet-stream' });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "筆畫作品.psd";
    a.click();
  } catch(e) {
    alert("PSD 產生失敗：" + e.message);
    console.error(e);
  }
}

function randomColor(){
  return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
}
</script>

</body>
</html>
